spring:
  application:
    name: MyStreaming
  
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB
      enabled: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024

# FFmpeg path — caminho absoluto para o binário do FFmpeg.
# Default: bundle incluído no projeto (Windows).
ffmpeg:
  path: C:\Users\pedro\Desktop\projetos\MyStreaming\ffmpeg\ffmpeg-2026-06-15-git-44d082edc8-full_build\bin\ffmpeg.exe

# JWT configuration
jwt:
  secret: ${JWT_SECRET:mystreaming_dev_secret_key_change_in_production_please}
  expiration-hours: 24

logging:
  level:
    root: INFO
    pedroMartinsMJ.MyStreaming: DEBUG
    org.springframework: INFO
