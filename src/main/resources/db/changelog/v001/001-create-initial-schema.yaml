databaseChangeLog:
  - changeSet:
      id: 1
      author: pedroMartinsMJ
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(255)
              - column:
                  name: preferred_resolution
                  type: varchar(50)
              - column:
                  name: preferred_language
                  type: varchar(50)
              - column:
                  name: enable_subtitles
                  type: boolean
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: last_login
                  type: timestamp
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false

        - createTable:
            tableName: videos
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(65535)
              - column:
                  name: poster_path
                  type: varchar(555)
              - column:
                  name: thumbnail_path
                  type: varchar(555)
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_video_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: original_file_path
                  type: varchar(555)
                  constraints:
                    nullable: false
              - column:
                  name: original_format
                  type: varchar(50)
              - column:
                  name: file_size
                  type: bigint
              - column:
                  name: original_width
                  type: int
              - column:
                  name: original_height
                  type: int
              - column:
                  name: original_codec
                  type: varchar(50)
              - column:
                  name: original_bitrate
                  type: int
              - column:
                  name: frame_rate
                  type: double precision
              - column:
                  name: duration_seconds
                  type: bigint
              - column:
                  name: genre
                  type: varchar(100)
              - column:
                  name: director
                  type: varchar(100)
              - column:
                  name: release_year
                  type: int
              - column:
                  name: imdb_rating
                  type: double precision
              - column:
                  name: language
                  type: varchar(50)
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: varchar(65535)
              - column:
                  name: video_quality_score
                  type: double precision
              - column:
                  name: video_quality_analysis
                  type: varchar(65535)
              - column:
                  name: uploaded_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: last_accessed_at
                  type: timestamp
              - column:
                  name: times_watched
                  type: bigint

        - createTable:
            tableName: video_tags
            columns:
              - column:
                  name: video_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tag_video
                    referencedTableName: videos
                    referencedColumnNames: id
              - column:
                  name: tag
                  type: varchar(100)
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: video_tags
            columnNames: video_id, tag
            constraintName: pk_video_tags

        - createTable:
            tableName: encoded_videos
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: video_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_encoded_video
                    referencedTableName: videos
                    referencedColumnNames: id
              - column:
                  name: codec
                  type: varchar(50)
              - column:
                  name: audio_codec
                  type: varchar(50)
              - column:
                  name: bitrate
                  type: int
              - column:
                  name: audio_bitrate
                  type: int
              - column:
                  name: width
                  type: int
              - column:
                  name: height
                  type: int
              - column:
                  name: frame_rate
                  type: double precision
              - column:
                  name: format
                  type: varchar(50)
              - column:
                  name: file_path
                  type: varchar(555)
              - column:
                  name: file_size
                  type: bigint
              - column:
                  name: file_hash
                  type: varchar(255)
              - column:
                  name: hls_base_path
                  type: varchar(555)
              - column:
                  name: segment_duration_seconds
                  type: int
              - column:
                  name: total_segments
                  type: bigint
              - column:
                  name: encoding_status
                  type: varchar(50)
              - column:
                  name: encoding_time_seconds
                  type: bigint
              - column:
                  name: compression_ratio
                  type: double precision
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: last_accessed_at
                  type: timestamp

        - createTable:
            tableName: encoding_jobs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: video_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_job_video
                    referencedTableName: videos
                    referencedColumnNames: id
              - column:
                  name: encoding_type
                  type: varchar(50)
              - column:
                  name: target_codec
                  type: varchar(50)
              - column:
                  name: target_bitrate
                  type: int
              - column:
                  name: target_width
                  type: int
              - column:
                  name: target_height
                  type: int
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: progress_percentage
                  type: double precision
              - column:
                  name: current_frame
                  type: bigint
              - column:
                  name: total_frames
                  type: bigint
              - column:
                  name: eta
                  type: varchar(50)
              - column:
                  name: error_message
                  type: varchar(65535)
              - column:
                  name: retry_count
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: max_retries
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: encoding_speed
                  type: double precision
              - column:
                  name: priority
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp
              - column:
                  name: completed_at
                  type: timestamp
              - column:
                  name: log_content
                  type: varchar(65535)

        - createTable:
            tableName: playback_histories
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_history_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: video_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_history_video
                    referencedTableName: videos
                    referencedColumnNames: id
              - column:
                  name: current_position_seconds
                  type: bigint
              - column:
                  name: duration_seconds
                  type: bigint
              - column:
                  name: device_info
                  type: varchar(255)
              - column:
                  name: resolution
                  type: varchar(50)
              - column:
                  name: played_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: paused_at
                  type: timestamp
              - column:
                  name: watch_time_seconds
                  type: bigint
              - column:
                  name: completed
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: avg_bitrate
                  type: double precision

        - createTable:
            tableName: favorites
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_favorite_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: video_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_favorite_video
                    referencedTableName: videos
                    referencedColumnNames: id
              - column:
                  name: added_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: user_rating
                  type: varchar(50)
              - column:
                  name: user_review
                  type: varchar(65535)

        - addUniqueConstraint:
            tableName: favorites
            columnNames: user_id, video_id
            constraintName: uq_favorite_user_video

        - createTable:
            tableName: subtitles
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: video_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_subtitle_video
                    referencedTableName: videos
                    referencedColumnNames: id
              - column:
                  name: language
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: format
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: varchar(555)
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: is_embedded
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: timestamp
                  constraints:
                    nullable: false

        - createTable:
            tableName: system_configs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ffmpeg_path
                  type: varchar(555)
              - column:
                  name: ffprobe_path
                  type: varchar(555)
              - column:
                  name: max_concurrent_encoding_jobs
                  type: int
              - column:
                  name: default_encoding_codec
                  type: varchar(50)
              - column:
                  name: video_storage_path
                  type: varchar(555)
              - column:
                  name: encoded_storage_path
                  type: varchar(555)
              - column:
                  name: temp_working_path
                  type: varchar(555)
              - column:
                  name: max_storage_gb
                  type: bigint
              - column:
                  name: streaming_protocol
                  type: varchar(50)
              - column:
                  name: hls_segment_duration
                  type: int
              - column:
                  name: available_bitrates
                  type: varchar(255)
              - column:
                  name: jwt_secret
                  type: varchar(555)
              - column:
                  name: jwt_expiration_hours
                  type: int
              - column:
                  name: thumbnail_width
                  type: int
              - column:
                  name: thumbnail_height
                  type: int
              - column:
                  name: poster_width
                  type: int
              - column:
                  name: poster_height
                  type: int
              - column:
                  name: updated_at
                  type: timestamp

        - createIndex:
            tableName: videos
            indexName: idx_video_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: videos
            indexName: idx_video_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: encoded_videos
            indexName: idx_encoded_video_bitrate
            columns:
              - column:
                  name: bitrate
        - createIndex:
            tableName: encoded_videos
            indexName: idx_encoded_video_codec
            columns:
              - column:
                  name: codec
        - createIndex:
            tableName: encoded_videos
            indexName: idx_encoded_video_video
            columns:
              - column:
                  name: video_id
        - createIndex:
            tableName: encoding_jobs
            indexName: idx_encoding_job_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: encoding_jobs
            indexName: idx_encoding_job_video
            columns:
              - column:
                  name: video_id
        - createIndex:
            tableName: playback_histories
            indexName: idx_playback_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: playback_histories
            indexName: idx_playback_video
            columns:
              - column:
                  name: video_id
